title = "MoonBit PPTX Demo"
size = [1280, 720]

[theme.colors]
background = "#10131A"
surface = "#1C2230"
surface_alt = "#243044"
text = "#F4F6FB"
muted = "#A8B0C2"
primary = "#3B82F6"
accent = "#F59E0B"

[theme.text_styles.base]
font_family = "Aptos"
color = "$text"
line_height = 1.1

[theme.text_styles.title]
extends = "$base"
font_size = 56
bold = true

[theme.text_styles.body]
extends = "$base"
font_size = 24
line_height = 1.15

[theme.text_styles.caption]
extends = "$base"
font_size = 16
color = "$muted"

[theme.text_styles.link]
extends = "$body"
color = "$primary"
bold = true

[theme.table_styles.table_base]
font_size = 14
font_family = "Aptos"
border = { style = "solid", width = 1, color = "$muted" }

[theme.table_styles.compact]
extends = "$table_base"
header_fill = "$surface_alt"
header_text_color = "$text"
body_text_color = "$text"

[theme.chart_styles.report_bar]
kind = "bar"
legend = "bottom"
style = 4
data_labels = "outside_end"
data_table = false
rounded_corners = false

[layouts.content.background]
type = "solid"
color = "$background"

[layouts.content.slots.eyebrow]
bounds = [80, 38, 500, 24]
style = "$caption"
align = ["left", "top"]

[layouts.content.slots.heading]
bounds = [80, 64, 900, 86]
style = "$title"
align = ["left", "top"]

[layouts.content.slots.footer]
bounds = [80, 672, 900, 24]
style = "$caption"
align = ["left", "top"]

[[layouts.content.elements]]
id = "accent"
type = "shape"
bounds = [54, 42, 8, 96]

[layouts.content.elements.content]
shape = "rect"

[layouts.content.elements.content.fill]
type = "solid"
color = "$primary"

[components.stat_card]
bounds = [0, 0, 180, 90]

[[components.stat_card.elements]]
id = "bg"
type = "shape"
bounds = [0, 0, 180, 90]

[components.stat_card.elements.content]
shape = "round_rect"

[components.stat_card.elements.content.fill]
type = "solid"
color = "$surface"

[components.stat_card.elements.content.border]
style = "solid"
width = 1
color = "$muted"

[[components.stat_card.elements]]
id = "label"
type = "text"
bounds = [16, 14, 148, 24]

[components.stat_card.elements.content]
style = "$caption"
text = "$label"

[[components.stat_card.elements]]
id = "value"
type = "text"
bounds = [16, 40, 148, 42]

[components.stat_card.elements.content]
style = "$body"
font_size = 24
bold = true
text = "$value"

[[pages]]
path = "pages/cover.page.toml"

[[pages]]
path = "pages/agenda.page.toml"

[[pages]]
path = "pages/shapes.page.toml"

[[pages]]
path = "pages/media.page.toml"
