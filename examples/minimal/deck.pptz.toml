title = "MoonBit PPTX Demo"
size = [1280, 720]

[theme.colors]
background = "#10131A"
surface = "#1C2230"
surface_alt = "#243044"
text = "#F4F6FB"
muted = "#A8B0C2"
primary = "#3B82F6"
accent = "#F59E0B"

[theme.text_styles.title]
font_size = 56
font_family = "Aptos"
color = "$text"
bold = true

[theme.text_styles.body]
font_size = 24
font_family = "Aptos"
color = "$text"
line_height = 1.15

[theme.text_styles.caption]
font_size = 16
font_family = "Aptos"
color = "$muted"

[theme.text_styles.link]
font_size = 24
font_family = "Aptos"
color = "$primary"
bold = true

[theme.table_styles.compact]
font_size = 14
font_family = "Aptos"
header_fill = "$surface_alt"
header_text_color = "$text"
body_text_color = "$text"
border = { style = "solid", width = 1, color = "$muted" }

[[pages]]
path = "pages/cover.page.toml"

[[pages]]
path = "pages/agenda.page.toml"

[[pages]]
path = "pages/shapes.page.toml"

[[pages]]
path = "pages/media.page.toml"
