page_type = "content"

[background]
type = "solid"
color = "$background"

[[elements]]
id = "heading"
type = "text"
bounds = [80, 70, 900, 70]

[elements.content]
style = "$title"
font_size = 44
text = "Images"

[[elements]]
id = "stretch_raster"
type = "image"
bounds = [80, 155, 330, 195]

[elements.content]
path = "images/hero.png"
fit = "stretch"

[[elements]]
id = "cover_raster"
type = "image"
bounds = [475, 155, 330, 195]

[elements.content]
path = "images/hero.png"
fit = "cover"

[elements.content.crop]
left = 0.08
top = 0
right = 0.08
bottom = 0

[[elements]]
id = "contain_raster"
type = "image"
bounds = [870, 155, 330, 195]

[elements.content]
path = "images/diagram.png"
fit = "contain"

[[elements]]
id = "svg_badge"
type = "image"
bounds = [360, 400, 560, 110]

[elements.content]
path = "images/badge.svg"
fit = "cover"

[[elements]]
id = "note_panel"
type = "shape"
bounds = [180, 545, 920, 80]

[elements.content]
shape = "rect"

[elements.content.fill]
type = "solid"
color = "$surface_alt"

[elements.content.border]
style = "solid"
width = 1
color = "$primary"

[[elements]]
id = "note"
type = "text"
bounds = [220, 565, 840, 40]

[elements.content]
style = "$caption"
align = ["center", "center"]
text = "Image elements support stretch, cover, contain, explicit crop, and SVG."
