page_type = "content"

[background]
type = "solid"
color = "$background"

[[elements]]
id = "heading"
type = "text"
bounds = [80, 60, 900, 95]

[elements.content]
style = "$title"
text = "Agenda"

[[elements]]
id = "items"
type = "text"
bounds = [110, 190, 460, 260]

[elements.content]
style = "$body"
text = """
1. Theme and background
2. Deck and page sources
3. Format check and generation
"""

[[elements]]
id = "diagram"
type = "image"
bounds = [650, 180, 500, 278]

[elements.content]
path = "images/diagram.png"
fit = "stretch"

[[elements]]
id = "summary_table"
type = "table"
bounds = [650, 500, 500, 120]

[elements.content]
col_widths = [220, 140, 140]
row_heights = [40, 40, 40]
rows = [
  { cells = [
    { text = "Metrics", col_span = 3 },
  ] },
  { cells = ["Revenue", "100", "150"] },
  { cells = ["Users", "42", "64"] },
]

[[elements]]
id = "revenue_chart"
type = "chart"
bounds = [110, 480, 440, 160]

[elements.content]
kind = "bar"
title = "Revenue"
legend = "bottom"
style = 4
data_labels = "outside_end"
rounded_corners = false
categories = ["Q1", "Q2", "Q3"]

[[elements.content.series]]
name = "Revenue"
values = [100.0, 150.0, 125.0]
