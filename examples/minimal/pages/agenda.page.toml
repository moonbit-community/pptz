page_type = "content"
layout = "$content"

[slots]
eyebrow = "Minimal deck"
heading = "Agenda"
footer = "Generated from a reusable content layout"

[[components]]
id = "revenue_card"
use = "$stat_card"
bounds = [390, 350, 180, 90]

[components.props]
label = "Revenue"
value = "150"

[[elements]]
id = "items"
type = "text"
bounds = [110, 190, 460, 260]

[elements.content]
style = "$body"
align = ["left", "top"]
wrap = true

[elements.content.body]
auto_fit = "shape"

[elements.content.body.inset]
left = 8
right = 8
top = 4
bottom = 4

[[elements.content.paragraphs]]
text = "Theme and background"
space_after = 8
margin_left = 18
indent = -9

[elements.content.paragraphs.bullet]
kind = "char"
char = "-"

[[elements.content.paragraphs]]
text = "Deck and page sources"
space_after = 8
margin_left = 18
indent = -9

[elements.content.paragraphs.bullet]
kind = "char"
char = "-"

[[elements.content.paragraphs]]
margin_left = 18
indent = -9

[elements.content.paragraphs.bullet]
kind = "char"
char = "-"

[[elements.content.paragraphs.runs]]
text = "Reference: "

[[elements.content.paragraphs.runs]]
text = "pptz schema"
style = "$link"
hyperlink = "https://github.com/Milky2018/pptz"
tooltip = "Project repository"

[[elements]]
id = "diagram"
type = "image"
bounds = [650, 180, 500, 278]

[elements.content]
path = "images/diagram.png"
fit = "stretch"

[[elements]]
id = "summary_table"
type = "table"
bounds = [650, 500, 500, 120]

[elements.content]
style = "$compact"
col_widths = [220, 140, 140]
row_heights = [40, 40, 40]
rows = [
  { cells = [
    { text = "Metrics", col_span = 3 },
  ] },
  { cells = ["Revenue", "100", "150"] },
  { cells = ["Users", "42", "64"] },
]

[[elements]]
id = "revenue_chart"
type = "chart"
bounds = [110, 480, 440, 160]

[elements.content]
chart_style = "$report_bar"
title = "Revenue"
data = [
  ["", "Q1", "Q2", "Q3"],
  ["Revenue", 100.0, 150.0, 125.0],
]
