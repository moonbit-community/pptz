page_type = "content"

[background]
type = "solid"
color = "$background"

[[elements]]
id = "heading"
type = "text"
bounds = [80, 70, 900, 70]

[elements.content]
style = "$title"
font_size = 44
text = "Shapes and Borders"

[[elements]]
id = "panel"
type = "shape"
bounds = [90, 170, 500, 320]

[elements.content]
shape = "round_rect"

[elements.content.fill]
type = "gradient"
direction = 90
stops = [
  { at = 0.0, color = "$surface" },
  { at = 1.0, color = "$surface_alt" },
]

[elements.content.border]
style = "solid"
width = 2
color = "$primary"

[elements.content.shadow]
color = "#00000066"
blur = 14
distance = 5
direction = 45

[[elements]]
id = "circle"
type = "shape"
bounds = [710, 175, 260, 260]

[elements.content]
shape = "ellipse"

[elements.content.fill]
type = "solid"
color = "#F59E0BCC"

[[elements]]
id = "outline"
type = "shape"
bounds = [835, 300, 260, 260]

[elements.content]
shape = "ellipse"

[elements.content.fill]
type = "none"

[elements.content.border]
style = "dash"
width = 3
color = "$text"

[[elements]]
id = "diamond"
type = "shape"
bounds = [620, 210, 90, 90]

[elements.content]
shape = "diamond"

[elements.content.fill]
type = "solid"
color = "$primary"

[[elements]]
id = "flow"
type = "connector"

[elements.content]
kind = "straight"
start = { element = "panel" }
end = { element = "circle" }
end_arrow = "triangle"

[elements.content.stroke]
dash = "dash"
width = 2
color = "$primary"

[elements.content.shadow]
color = "#00000066"
blur = 8
distance = 3
direction = 45

[[elements]]
id = "cube_icon"
type = "icon"
bounds = [985, 195, 80, 80]

[elements.content]
name = "fas:cube"

[elements.content.fill]
type = "solid"
color = "$accent"

[[elements]]
id = "body"
type = "text"
bounds = [130, 215, 420, 210]

[elements.content]
style = "$body"
font_size = 22
color = "$muted"
wrap = true
text = """
Current writer support:
rect, round_rect, ellipse,
common presets,
alpha, gradients, dash borders.
"""

[[elements]]
id = "caption"
type = "text"
bounds = [740, 565, 400, 70]

[elements.content]
style = "$caption"
italic = true
align = ["center", "center"]
text = "This slide has no unsupported features."
