page_type: "cover"
background:
  type: "gradient"
  direction: 90
  stops:
    - { at: 0.0, color: "$background" }
    - { at: 1.0, color: "$surface" }
elements:
  -
    id: "title"
    type: "text"
    bounds: [100, 235, 1080, 95]
    content:
      style: "$title"
      align: ["center", "center"]
      text: "MoonBit PPTX Demo"
  -
    id: "subtitle"
    type: "text"
    bounds: [220, 345, 840, 60]
    content:
      style: "$body"
      align: ["center", "center"]
      text: "Portable slide generation with pptz"
  -
    id: "hero"
    type: "image"
    bounds: [240, 475, 800, 170]
    content: { path: "images/hero.png", fit: "stretch" }
