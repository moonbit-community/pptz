page_type = "cover"

[background]
type = "gradient"
direction = 90
stops = [
  { at = 0.0, color = "$background" },
  { at = 1.0, color = "$surface" },
]

[[elements]]
id = "title"
type = "text"
bounds = [100, 235, 1080, 95]

[elements.content]
style = "$title"
align = ["center", "center"]
text = "MoonBit PPTX Demo"

[[elements]]
id = "subtitle"
type = "text"
bounds = [220, 345, 840, 60]

[elements.content]
style = "$body"
align = ["center", "center"]
text = "Portable slide generation with pptz"

[[elements]]
id = "hero"
type = "image"
bounds = [240, 475, 800, 170]

[elements.content]
path = "images/hero.png"
fit = "stretch"
