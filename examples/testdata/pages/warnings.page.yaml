elements:
  -
    id: "blank"
    type: "text"
    bounds: [-10, 0, 0, 20]
    content: { text: "   " }
  -
    id: "overflow"
    type: "text"
    bounds: [20, 40, 120, 24]
    content: { font_size: 28, font_family: "Aptos, Arial", text: "This sentence is intentionally much too long for the tiny text box." }
  -
    id: "layout_spaces"
    type: "text"
    bounds: [20, 80, 600, 60]
    content: { text: "Left          Right" }
  -
    id: "left_node"
    type: "shape"
    bounds: [20, 180, 100, 60]
    content: { shape: "round_rect" }
  -
    id: "middle_node"
    type: "shape"
    bounds: [180, 180, 100, 60]
    content: { shape: "round_rect" }
  -
    id: "right_node"
    type: "shape"
    bounds: [340, 180, 100, 60]
    content: { shape: "round_rect" }
  -
    id: "crossing_connector"
    type: "connector"
    content:
      kind: "straight"
      start: { element: "left_node" }
      end: { element: "right_node" }
