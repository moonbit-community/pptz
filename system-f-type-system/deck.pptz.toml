title = "System F Type System"
size = [1280, 720]

[theme.colors]
background = "#0F172A"
panel = "#172033"
panel_alt = "#1F2A44"
ink = "#F8FAFC"
muted = "#B6C2D9"
cyan = "#38BDF8"
green = "#34D399"
yellow = "#FBBF24"
red = "#FB7185"
line = "#42526E"

[theme.text_styles.title]
font_size = 54
font_family = "MiSans, Arial"
color = "$ink"
bold = true

[theme.text_styles.heading]
font_size = 34
font_family = "MiSans, Arial"
color = "$ink"
bold = true

[theme.text_styles.body]
font_size = 24
font_family = "MiSans, Arial"
color = "$ink"

[theme.text_styles.small]
font_size = 18
font_family = "MiSans, Arial"
color = "$muted"

[theme.text_styles.code]
font_size = 24
font_family = "Menlo, Consolas"
color = "$ink"

