page_type = "content"

[background]
type = "solid"
color = "$background"

[[elements]]
id = "heading"
type = "text"
bounds = [78, 56, 900, 58]

[elements.content]
style = "$heading"
text = "为什么需要 System F"

[[elements]]
id = "stlc_panel"
type = "shape"
bounds = [80, 155, 500, 380]

[elements.content]
shape = "rect"

[elements.content.fill]
type = "solid"
color = "$panel"

[elements.content.border]
style = "solid"
width = 2
color = "$line"

[[elements]]
id = "stlc_title"
type = "text"
bounds = [112, 185, 400, 38]

[elements.content]
style = "$body"
bold = true
color = "$yellow"
text = "简单类型 lambda 演算"

[[elements]]
id = "stlc_body"
type = "text"
bounds = [112, 245, 425, 230]

[elements.content]
style = "$body"
font_size = 23
text = """
每个函数只能服务一个具体类型。

idInt  : Int  -> Int
idBool : Bool -> Bool

重复定义会掩盖真正的抽象：
“对任意类型 A，返回同一个 A”。
"""

[[elements]]
id = "systemf_panel"
type = "shape"
bounds = [700, 155, 500, 380]

[elements.content]
shape = "rect"

[elements.content.fill]
type = "solid"
color = "$panel"

[elements.content.border]
style = "solid"
width = 2
color = "$cyan"

[[elements]]
id = "systemf_title"
type = "text"
bounds = [732, 185, 410, 38]

[elements.content]
style = "$body"
bold = true
color = "$cyan"
text = "System F"

[[elements]]
id = "systemf_body"
type = "text"
bounds = [732, 245, 425, 230]

[elements.content]
style = "$body"
font_size = 23
text = """
把类型参数变成语言的一部分。

id : forall A. A -> A
id [Int]  3
id [Bool] true

同一段程序可在不同类型上实例化。
"""

[[elements]]
id = "arrow"
type = "text"
bounds = [600, 300, 80, 50]

[elements.content]
style = "$title"
font_size = 40
color = "$green"
align = ["center", "center"]
text = "=>"

[[elements]]
id = "note"
type = "text"
bounds = [130, 585, 1000, 50]

[elements.content]
style = "$small"
align = ["center", "center"]
text = "System F 又称二阶 lambda 演算：项可以依赖项，项也可以依赖类型。"
