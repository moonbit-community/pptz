[elements.content.border]
style = "solid"
width = 2
color = "$line"

[[elements]]
id = "list"
type = "text"
bounds = [155, 195, 590, 300]

[elements.content]
style = "$body"
font_size = 24
text = """
1. 显式表达全称多态。
2. 把类型抽象和类型应用纳入核心语言。
3. 保持类型安全，并具备强归一化。
4. 通过参数性得到可推理的泛型行为。
5. 影响 ML、Haskell、Scala、Rust 等语言的泛型设计。
"""

